openapi: 3.1.0
info:
  title: Fox Delivery Platform API
  version: 1.0.0
  description: >-
    API contracts for customer, merchant, courier and admin channels.
servers:
  - url: https://api.fox.local/v1
paths:
  /merchant/orders/stream-token:
    post:
      summary: Create a short-lived token for merchant order realtime channels
      tags: [Merchant Orders]
      responses:
        '201':
          description: Token issued
  /merchant/orders:
    get:
      summary: List merchant orders with realtime-friendly filters
      tags: [Merchant Orders]
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Merchant order list
    post:
      summary: Create manual/POS order for merchant
      tags: [Merchant Orders]
      responses:
        '201':
          description: Order created
  /merchant/orders/{orderId}/accept:
    post:
      summary: Accept incoming order and set initial prep time
      tags: [Merchant Orders]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prepTimeMin]
              properties:
                prepTimeMin: { type: integer, minimum: 1, maximum: 180 }
      responses:
        '200': { description: Order accepted }
  /merchant/orders/{orderId}/reject:
    post:
      summary: Reject incoming order with reason
      tags: [Merchant Orders]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200': { description: Order rejected }
  /merchant/orders/{orderId}/status:
    patch:
      summary: Update merchant-facing order status
      tags: [Merchant Orders]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantOrderStatusUpdate'
      responses:
        '200': { description: Status updated }
  /merchant/catalog/products:
    post:
      summary: Create merchant product with variations and schedule
      tags: [Merchant Catalog]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201': { description: Product created }
  /merchant/finance/statement:
    get:
      summary: Merchant statement with commission, fees and transfers
      tags: [Merchant Finance]
      responses:
        '200': { description: Statement payload }
  /merchant/dashboard:
    get:
      summary: Merchant dashboard metrics in near real time
      tags: [Merchant Dashboard]
      responses:
        '200': { description: Dashboard metrics }
  /courier/offers/active:
    get:
      summary: Fetch active dispatch offers for courier
      tags: [Courier Dispatch]
      responses:
        '200': { description: Active offers }
  /courier/offers/{offerId}/accept:
    post:
      summary: Accept delivery offer within timeout
      tags: [Courier Dispatch]
      parameters:
        - in: path
          name: offerId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Offer accepted }
  /courier/tasks/{taskId}/status:
    patch:
      summary: Update courier task status and proof data
      tags: [Courier Tasks]
      parameters:
        - in: path
          name: taskId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourierTaskStatusUpdate'
      responses:
        '200': { description: Task updated }
  /courier/wallet:
    get:
      summary: Courier earnings, available balance and withdrawal history
      tags: [Courier Finance]
      responses:
        '200': { description: Wallet response }
  /customer/discovery/feed:
    get:
      summary: Smart storefront feed by location, filters and ranking
      tags: [Customer Discovery]
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lng
          required: true
          schema: { type: number }
        - in: query
          name: module
          schema: { type: string }
        - in: query
          name: filters
          schema: { type: array, items: { type: string } }
      responses:
        '200': { description: Feed response }
  /customer/cart/price:
    post:
      summary: Price cart with taxes, fees, delivery, promos and ETA
      tags: [Customer Checkout]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartPricingRequest'
      responses:
        '200': { description: Cart priced }
  /customer/orders:
    post:
      summary: Place customer order
      tags: [Customer Checkout]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '201': { description: Order placed }
  /customer/orders/{orderId}/tracking:
    get:
      summary: Real-time order tracking timeline
      tags: [Customer Orders]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200': { description: Tracking payload }
components:
  parameters:
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    MerchantOrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [merchant_received, preparing, ready_for_pickup, in_delivery]
        prepTimeMin:
          type: integer
        reason:
          type: string
    ProductCreateRequest:
      type: object
      required: [categoryId, name, basePrice]
      properties:
        categoryId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        basePrice: { type: number }
        stockQuantity: { type: integer }
        availabilitySchedule:
          type: array
          items:
            type: object
            properties:
              dayOfWeek: { type: integer, minimum: 0, maximum: 6 }
              start: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$' }
              end: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$' }
        modifierGroups:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              required: { type: boolean }
              minSelect: { type: integer }
              maxSelect: { type: integer }
    CourierTaskStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [courier_en_route_pickup, arrived_pickup, picked_up, courier_en_route_dropoff, arrived_dropoff, completed]
        latitude: { type: number }
        longitude: { type: number }
        proof:
          type: object
          additionalProperties: true
    CartPricingRequest:
      type: object
      required: [merchantId, items, deliveryAddress]
      properties:
        merchantId: { type: string, format: uuid }
        couponCode: { type: string }
        items:
          type: array
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: string, format: uuid }
              quantity: { type: integer, minimum: 1 }
              modifiers:
                type: array
                items: { type: string, format: uuid }
        deliveryAddress:
          type: object
          additionalProperties: true
    PlaceOrderRequest:
      allOf:
        - $ref: '#/components/schemas/CartPricingRequest'
        - type: object
          required: [paymentMethod]
          properties:
            paymentMethod:
              type: string
              enum: [pix, card, cash]
            useWalletBalance:
              type: boolean
